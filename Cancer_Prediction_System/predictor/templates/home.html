<!DOCTYPE html>
<html>
<head>
    <title>AI Cancer Prediction</title>
    <style>
        body { font-family: 'Arial'; background-color: #f0f2f5; text-align: center; }
        .container { background: white; width: 60%; margin: 50px auto; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .upload-btn { background: #007bff; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .result-box { margin-top: 30px; padding: 20px; border-radius: 10px; background: #e9f7ef; border: 1px solid #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Advanced Cancer Prediction System</h1>
        <p>Upload MRI, CT, or Histopathology scans for instant AI analysis.</p>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="scan" required>
            <br><br>
            <button type="submit" class="upload-btn">Start Diagnosis</button>
        </form>

        {% if result %}
        <div class="result-box">
            <h2 style="color: #d9534f;">Result: {{ result }}</h2>
            <h3>AI Confidence Score: {{ score }}%</h3>
            <img src="{{ url }}" style="max-width: 400px; border-radius: 10px; margin-top: 15px;">
        </div>
        {% endif %}
    </div>
</body>
</html>
